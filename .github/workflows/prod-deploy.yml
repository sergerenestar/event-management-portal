name: Deploy — Prod

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

concurrency:
  group: deploy-prod
  cancel-in-progress: false

env:
  AZURE_WEBAPP_NAME: app-eventportal-prod
  AZURE_STATICAPP_NAME: stapp-eventportal-prod

jobs:
  backend-deploy:
    name: Build & Deploy Backend (prod)
    runs-on: ubuntu-latest
    environment: prod   # requires manual approval in GitHub environment settings
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Publish
        run: |
          dotnet publish src/EventPortal.Api/EventPortal.Api.csproj \
            -c Release \
            -o ../publish

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          package: ./publish
          app-settings-json: |
            [
              { "name": "Entra__TenantId",              "value": "${{ secrets.ENTRA_TENANT_ID }}", "slotSetting": false },
              { "name": "Entra__ClientId",               "value": "${{ secrets.ENTRA_CLIENT_ID }}", "slotSetting": false },
              { "name": "Jwt__SigningKey",                "value": "${{ secrets.JWT_SIGNING_KEY }}", "slotSetting": false },
              { "name": "Cors__AllowedOrigins",          "value": "${{ vars.CORS_ALLOWED_ORIGINS }}", "slotSetting": false },
              { "name": "Eventbrite__ApiToken",          "value": "${{ secrets.EVENTBRITE_API_TOKEN }}", "slotSetting": false },
              { "name": "Eventbrite__OrganizationId",    "value": "${{ secrets.EVENTBRITE_ORGANIZATION_ID }}", "slotSetting": false }
            ]

  frontend-deploy:
    name: Build & Deploy Frontend (prod)
    runs-on: ubuntu-latest
    environment: prod   # requires manual approval in GitHub environment settings
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install & Build
        run: |
          npm ci
          npm run build
        env:
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}
          VITE_ENTRA_CLIENT_ID: ${{ secrets.ENTRA_CLIENT_ID }}
          VITE_ENTRA_TENANT_ID: ${{ secrets.ENTRA_TENANT_ID }}
          VITE_REDIRECT_URI: ${{ vars.VITE_REDIRECT_URI }}

      - name: Deploy to Static Web App
        uses: azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_PROD }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          app_location: "frontend"
          output_location: "dist"
          skip_app_build: true
