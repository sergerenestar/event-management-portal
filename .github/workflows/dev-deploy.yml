name: Deploy — Dev

on:
  push:
    branches: [main]

concurrency:
  group: deploy-dev
  cancel-in-progress: true

env:
  ACR_NAME: acreventportaldev
  BACKEND_APP:    ca-backend-eventportal-dev
  FRONTEND_APP:   ca-frontend-eventportal-dev
  RESOURCE_GROUP: rg-eventportal-dev

jobs:
  deploy-backend:
    name: Build, Push & Deploy Backend
    runs-on: ubuntu-latest
    environment: dev

    steps:
      - uses: actions/checkout@v4

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id:       ${{ secrets.AZURE_CLIENT_ID }}
          client-secret:   ${{ secrets.AZURE_CLIENT_SECRET }}
          tenant-id:       ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Login to ACR
        run: az acr login --name ${{ env.ACR_NAME }}

      - name: Build & Push backend image
        working-directory: backend
        run: |
          IMAGE=${{ env.ACR_NAME }}.azurecr.io/backend:${{ github.sha }}
          docker build -t $IMAGE .
          docker push $IMAGE

      - name: Configure ACR credentials on Container App
        run: |
          ACR_PASS=$(az acr credential show --name ${{ env.ACR_NAME }} --query passwords[0].value -o tsv)
          az containerapp registry set \
            --name            ${{ env.BACKEND_APP }} \
            --resource-group  ${{ env.RESOURCE_GROUP }} \
            --server          ${{ env.ACR_NAME }}.azurecr.io \
            --username        ${{ env.ACR_NAME }} \
            --password        "$ACR_PASS"

      - name: Deploy new backend image
        run: |
          az containerapp update \
            --name           ${{ env.BACKEND_APP }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --image          ${{ env.ACR_NAME }}.azurecr.io/backend:${{ github.sha }}

  migrate-database:
    name: Run EF Migrations
    runs-on: ubuntu-latest
    environment: dev
    needs: deploy-backend

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Install EF tools
        run: dotnet tool install --global dotnet-ef

      - name: Run migrations
        working-directory: backend
        run: |
          dotnet ef database update \
            --project src/EventPortal.Api/EventPortal.Api.csproj \
            --connection "${{ secrets.SQL_CONNECTION_STRING }}"

  deploy-frontend:
    name: Build, Push & Deploy Frontend
    runs-on: ubuntu-latest
    environment: dev

    steps:
      - uses: actions/checkout@v4

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id:       ${{ secrets.AZURE_CLIENT_ID }}
          client-secret:   ${{ secrets.AZURE_CLIENT_SECRET }}
          tenant-id:       ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Login to ACR
        run: az acr login --name ${{ env.ACR_NAME }}

      - name: Build & Push frontend image
        working-directory: frontend
        run: |
          IMAGE=${{ env.ACR_NAME }}.azurecr.io/frontend:${{ github.sha }}
          docker build \
            --build-arg VITE_API_BASE_URL=${{ vars.VITE_API_BASE_URL }} \
            --build-arg VITE_ENTRA_CLIENT_ID=${{ secrets.ENTRA_CLIENT_ID }} \
            --build-arg VITE_ENTRA_TENANT_ID=${{ secrets.ENTRA_TENANT_ID }} \
            --build-arg VITE_REDIRECT_URI=${{ vars.VITE_REDIRECT_URI }} \
            -t $IMAGE .
          docker push $IMAGE

      - name: Configure ACR credentials on Container App
        run: |
          ACR_PASS=$(az acr credential show --name ${{ env.ACR_NAME }} --query passwords[0].value -o tsv)
          az containerapp registry set \
            --name            ${{ env.FRONTEND_APP }} \
            --resource-group  ${{ env.RESOURCE_GROUP }} \
            --server          ${{ env.ACR_NAME }}.azurecr.io \
            --username        ${{ env.ACR_NAME }} \
            --password        "$ACR_PASS"

      - name: Deploy new frontend image
        run: |
          az containerapp update \
            --name           ${{ env.FRONTEND_APP }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --image          ${{ env.ACR_NAME }}.azurecr.io/frontend:${{ github.sha }}
